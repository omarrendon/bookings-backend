services:
  db:
    container_name: reservas-database
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: reservas-app
    build: .
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db   # sobreescribe DB_HOST del .env para apuntar al servicio db
    depends_on:
      db:
        condition: service_healthy  # espera a que Postgres pase su healthcheck
    command: >
      sh -c "node dist/database/utils/run-migrations.js &&
             node dist/app.js"

volumes:
  postgres_data:
